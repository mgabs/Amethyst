name: Build

on:
  push:
    branches: [ development, master ]
  pull_request:

jobs:
  build:
    name: Build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          brew bundle

      - name: Build (Release)
        run: fastlane local_release
