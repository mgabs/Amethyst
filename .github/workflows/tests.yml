name: Tests

on:
  push:
    branches: [ development ]
  pull_request:

jobs:
  test:
    name: Run Tests
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Install Dependencies
        run: |
          brew bundle

      - name: Run Tests
        run: fastlane test
