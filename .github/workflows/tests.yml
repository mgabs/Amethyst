name: Tests

on:
  push:
    branches: [ development ]
  pull_request:

jobs:
  test:
    name: Run Tests
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Dependencies
        run: |
          brew bundle

      - name: Run Tests
        run: bundle exec fastlane test
